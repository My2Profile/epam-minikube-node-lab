name: Deploy to Minikube using Github Actions

on: [push]

jobs:
  minikube-deploy:
    runs-on: ubuntu-latest
    name: Build Node.js Docker image and deploy to Minikube

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: docker
          cpus: 2
          memory: 4000m

      - name: Check cluster
        run: kubectl get pods -A

      - name: Install and test Node.js app
        run: |
          npm install
          npm test

      - name: Build image inside Minikube
        run: |
          export SHELL=/bin/bash
          eval $(minikube -p minikube docker-env)
          docker build -f ./Dockerfile -t devopshint/node-app:latest .
          echo "Verifying images:"
          docker images

      - name: Deploy to Minikube
        run: kubectl apply -f k8s-node-app.yaml

      - name: Wait for deployment
        run: kubectl rollout status deployment/nodejs-app --timeout=180s

      - name: Show resources
        run: |
          kubectl get deployments
          kubectl get pods -o wide
          kubectl get svc

      - name: Test services URL
        run: |
          minikube service list
          URL=$(minikube service nodejs-app --url)
          echo "Service URL: $URL"
          curl -f "$URL"
